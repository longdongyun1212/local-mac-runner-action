name: "Local Mac iOS Build Action"
description: "可复用 iOS 构建 Action，支持 project 和 workspace"
author: "Mac CI Team"

branding:
  icon: "cpu"
  color: "purple"

inputs:
  scheme:
    description: "Xcode Scheme 名称（必需）"
    required: true
  project:
    description: "Xcode Project 路径，如 MyApp.xcodeproj（与 workspace 二选一）"
    required: false
    default: ""
  workspace:
    description: "Xcode Workspace 路径，如 MyApp.xcworkspace（与 project 二选一）"
    required: false
    default: ""
  configuration:
    description: "构建配置 (Debug/Release)"
    required: false
    default: "Release"
  upload_artifact:
    description: "是否上传 .ipa (true/false)"
    required: false
    default: "true"

outputs:
  app_path:
    description: "构建产物路径"
    value: ${{ steps.build.outputs.app_path }}
  app_name:
    description: "IPA 文件名"
    value: ${{ steps.build.outputs.app_name }}

runs:
  using: "composite"
  steps:
    - name: "打印环境信息"
      shell: "bash"
      run: |
        echo "======================================"
        echo "✅ 本地 Mac CI 集群 - iOS 构建"
        echo "执行机器: $(hostname)"
        echo "Xcode: $(xcodebuild -version | head -1)"
        echo "======================================"

    - name: "安装 CocoaPods 依赖"
      shell: "bash"
      run: |
        if [ -f "Podfile" ]; then
          echo "📦 安装 CocoaPods 依赖..."
          pod install --repo-update
        else
          echo "ℹ️ 没有 Podfile，跳过"
        fi

    - name: "构建 iOS 应用"
      id: build
      shell: "bash"
      env:
        INPUT_SCHEME: ${{ inputs.scheme }}
        INPUT_PROJECT: ${{ inputs.project }}
        INPUT_WORKSPACE: ${{ inputs.workspace }}
        INPUT_CONFIGURATION: ${{ inputs.configuration }}
      run: |
        echo "🔍 参数检查:"
        echo "  Scheme: $INPUT_SCHEME"
        echo "  Project: $INPUT_PROJECT"
        echo "  Workspace: $INPUT_WORKSPACE"
        echo "  Configuration: $INPUT_CONFIGURATION"

        if [ -z "$INPUT_SCHEME" ]; then
          echo "❌ 错误: scheme 是必填参数"
          exit 1
        fi

        PROJECT_FLAG=""
        if [ -n "$INPUT_WORKSPACE" ]; then
          echo "🔧 使用 Workspace: $INPUT_WORKSPACE"
          PROJECT_FLAG="-workspace $INPUT_WORKSPACE"
        elif [ -n "$INPUT_PROJECT" ]; then
          echo "🔧 使用 Project: $INPUT_PROJECT"
          PROJECT_FLAG="-project $INPUT_PROJECT"
        else
          PROJECT_FILE=$(find . -maxdepth 1 -name "*.xcodeproj" -type d | head -1 | sed 's|^\./||')
          if [ -z "$PROJECT_FILE" ]; then
            echo "❌ 错误: 未找到 .xcodeproj，请指定 project 或 workspace"
            exit 1
          fi
          echo "🔧 自动检测到 Project: $PROJECT_FILE"
          PROJECT_FLAG="-project $PROJECT_FILE"
        fi

        echo "📦 开始编译..."
        xcodebuild $PROJECT_FLAG \
          -scheme "$INPUT_SCHEME" \
          -configuration "$INPUT_CONFIGURATION" \
          -derivedDataPath ./build \
          CODE_SIGNING_ALLOWED=NO

        if [ $? -eq 0 ]; then
          echo "✅ 编译成功"
        else
          echo "❌ 编译失败"
          exit 1
        fi

    - name: "导出 IPA"
      shell: "bash"
      run: |
        mkdir -p ./output
        xcodebuild -exportArchive \
          -archivePath ./build/Build/Products/${{ inputs.configuration }}/*.xcarchive \
          -exportPath ./output \
          -exportOptionsPlist ./ExportOptions.plist \
          -allowProvisioningUpdates || echo "⚠️ 导出跳过（可能不需要签名）"

        IPA_FILE=$(ls ./output/*.ipa 2>/dev/null | head -1)
        if [ -n "$IPA_FILE" ]; then
          echo "✅ IPA 生成成功: $IPA_FILE"
          echo "app_path=$IPA_FILE" >> $GITHUB_OUTPUT
          echo "app_name=$(basename "$IPA_FILE")" >> $GITHUB_OUTPUT
        else
          echo "ℹ️ 未生成 IPA（可能是库项目）"
        fi

    - name: "上传 IPA"
      if: inputs.upload_artifact == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: iOS-Build
        path: ./output/*.ipa
        retention-days: 30
        if-no-files-found: ignore
