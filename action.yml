name: "iOS Build Action"
description: "在本地 Mac CI 集群上构建 iOS 应用，并自动上传 .ipa 安装包"
author: "Local Mac Admin"

branding:
  icon: "cpu"
  color: "purple"

inputs:
  scheme:
    description: "Xcode Scheme 名称（必需）"
    required: true
  project:
    description: "Xcode Project 路径（如 Kingfisher.xcodeproj），与 workspace 二选一"
    required: false
    default: ""
  workspace:
    description: "Xcode Workspace 路径（如 YourApp.xcworkspace），与 project 二选一"
    required: false
    default: ""
  configuration:
    description: "构建配置 (Debug/Release)"
    required: false
    default: "Release"
  export_method:
    description: "导出方式 (app-store/ad-hoc/development/enterprise)"
    required: false
    default: "development"
  upload_artifact:
    description: "是否自动上传 .ipa 到 GitHub Actions (true/false)"
    required: false
    default: "true"

outputs:
  app_path:
    description: "构建产物路径"
    value: ${{ steps.build.outputs.app_path }}
  app_name:
    description: "IPA 文件名"
    value: ${{ steps.build.outputs.app_name }}

runs:
  using: "composite"
  steps:
    - name: "接入本地 Mac CI 集群"
      shell: "bash"
      run: |
        echo "======================================"
        echo "✅ 接入本地 Mac CI 集群 - iOS 构建"
        echo "执行机器: $(hostname)"
        echo "Xcode: $(xcodebuild -version | head -1)"
        echo "======================================"

    - name: "安装 CocoaPods 依赖"
      shell: "bash"
      run: |
        if [ -f "Podfile" ]; then
          echo "📦 安装 CocoaPods 依赖..."
          pod install --repo-update
        else
          echo "ℹ️ 没有 Podfile，跳过依赖安装"
        fi

    - name: "构建 iOS 应用"
      id: build
      shell: "bash"
      run: |
        PROJECT_FLAG=""
        if [ -n "${{ inputs.workspace }}" ]; then
          echo "🔧 使用 Workspace: ${{ inputs.workspace }}"
          PROJECT_FLAG="-workspace ${{ inputs.workspace }}"
        elif [ -n "${{ inputs.project }}" ]; then
          echo "🔧 使用 Project: ${{ inputs.project }}"
          PROJECT_FLAG="-project ${{ inputs.project }}"
        else
          # 自动查找 .xcodeproj 目录
          PROJECT_FILE=$(find . -maxdepth 1 -name "*.xcodeproj" -type d | head -1 | sed 's|^\./||')
          if [ -z "$PROJECT_FILE" ]; then
            echo "❌ 错误：未找到 .xcodeproj 文件，请指定 project 或 workspace"
            exit 1
          fi
          echo "🔧 自动检测到 Project: $PROJECT_FILE"
          PROJECT_FLAG="-project $PROJECT_FILE"
        fi

        echo "📦 开始编译..."
        xcodebuild $PROJECT_FLAG \
          -scheme "${{ inputs.scheme }}" \
          -configuration "${{ inputs.configuration }}" \
          -derivedDataPath ./build \
          CODE_SIGNING_ALLOWED=NO

        if [ $? -eq 0 ]; then
          echo "✅ 编译成功"
        else
          echo "❌ 编译失败"
          exit 1
        fi

    - name: "导出 IPA"
      shell: "bash"
      run: |
        mkdir -p ./output
        echo "📦 尝试导出 IPA..."
        xcodebuild -exportArchive \
          -archivePath ./build/Build/Products/${{ inputs.configuration }}/*.xcarchive \
          -exportPath ./output \
          -exportOptionsPlist ./ExportOptions.plist \
          -allowProvisioningUpdates || echo "⚠️ 导出失败（可能缺少签名配置）"
        IPA_FILE=$(ls ./output/*.ipa 2>/dev/null | head -1)
        if [ -n "$IPA_FILE" ]; then
          echo "✅ IPA 导出成功: $IPA_FILE"
          echo "app_path=$IPA_FILE" >> $GITHUB_OUTPUT
          echo "app_name=$(basename "$IPA_FILE")" >> $GITHUB_OUTPUT
        else
          echo "ℹ️ 未生成 IPA 文件（可能是库项目，无需导出）"
          echo "app_path=" >> $GITHUB_OUTPUT
          echo "app_name=" >> $GITHUB_OUTPUT
        fi

    - name: "上传 IPA 到 GitHub Actions"
      if: inputs.upload_artifact == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: iOS-App-${{ inputs.scheme }}
        path: ./output/*.ipa
        retention-days: 30
        if-no-files-found: ignore
