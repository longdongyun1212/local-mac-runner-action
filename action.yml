name: "Local Mac CI Cluster"
description: "接入组织自有10台Mac自托管CI集群，原有runs-on: macos-latest无需修改"
author: "Local Mac Admin"

branding:
  icon: "cpu"
  color: "purple"

inputs:
  placeholder_param:
    description: "预留扩展参数，业务使用无需填写"
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: "提示已接入本地Mac算力池"
      shell: "bash"
      run: |
        echo "======================================"
        echo "✅ 成功绑定组织本地Mac CI集群"
        echo "流水线将调度自有带macos-latest标签Mac机器执行"
        echo "======================================"
